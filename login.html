<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>(function(){var t=localStorage.getItem('motorSupervisionTheme')||'dark';document.documentElement.setAttribute('data-theme',t);document.documentElement.setAttribute('data-bs-theme',t==='light'?'light':'dark');})();</script>
  <title>Connexion — Supervision Moteur</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <!-- Custom styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="login" class="login-page">

  <div class="login-background">
    <div class="login-grid-overlay"></div>
  </div>

  <main class="login-container">
    <div class="login-card">
      <!-- En-tête -->
      <div class="login-header text-center">
        <div class="login-icon mx-auto">
          <i class="bi bi-shield-lock"></i>
        </div>
        <h1 class="login-title">Accès Supervision</h1>
        <p class="login-subtitle">Moteur asynchrone triphasé — Zone sécurisée</p>
      </div>

      <!-- Formulaire -->
      <form id="loginForm" class="login-form" novalidate>
        <div id="loginError" class="alert alert-danger login-error d-none" role="alert">
          <i class="bi bi-exclamation-triangle-fill me-2"></i>
          <span id="loginErrorMessage">Identifiants incorrects.</span>
        </div>

        <div class="mb-3">
          <label for="username" class="form-label login-label">
            <i class="bi bi-person"></i> Nom
          </label>
          <input
            type="text"
            class="form-control login-input"
            id="username"
            name="username"
            placeholder="Entrez votre identifiant"
            autocomplete="username"
            required
          >
        </div>

        <div class="mb-4">
          <label for="password" class="form-label login-label">
            <i class="bi bi-key"></i> Mot de passe
          </label>
          <div class="input-group">
            <input
              type="password"
              class="form-control login-input"
              id="password"
              name="password"
              placeholder="Entrez votre mot de passe"
              autocomplete="current-password"
              required
            >
            <button class="btn btn-toggle-password" type="button" id="btnTogglePassword" title="Afficher / masquer">
              <i class="bi bi-eye" id="togglePasswordIcon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-login w-100" id="btnLogin">
          <i class="bi bi-box-arrow-in-right"></i> Se connecter
        </button>
      </form>

      <!-- Pied de carte -->
      <div class="login-footer text-center">
        <button type="button" class="btn btn-theme-login" id="btnThemeToggle" title="Changer le thème">
          <i class="bi bi-sun-fill"></i> Mode clair
        </button>
        <small class="d-block mt-3 text-muted">
          <i class="bi bi-info-circle"></i>
          Authentification locale — Projet de simulation industrielle
        </small>
      </div>
    </div>

    <p class="login-copyright text-center">
      <small>Supervision Moteur Asynchrone — Maintenance prédictive</small>
    </p>
  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Application (module auth) -->
  <script src="script.js"></script>
</body>
</html>
